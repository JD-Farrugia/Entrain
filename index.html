<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrain</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #09090e;
      --surface:    #111118;
      --surface-2:  #1a1a24;
      --surface-3:  #22222e;
      --border:     rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.13);
      --text:       #f0f0f8;
      --text-2:     #7878a0;
      --text-3:     #38385a;
      --accent:     #f59e0b;
      --accent-dim: rgba(245,158,11,0.12);
      --accent-glow:rgba(245,158,11,0.20);
      --red:        #ef4444;
    }

    html, body { background: var(--bg); }

    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 520px;
      padding: 40px 20px 28px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .wordmark {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .wordmark span {
      color: var(--accent);
    }

    .lib-count {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 999px;
    }

    /* ── Main ── */
    .main {
      width: 100%;
      max-width: 520px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Section label ── */
    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }

    /* ── Dropdowns ── */
    .dropdowns {
      display: flex;
      gap: 8px;
    }

    .dropdown-wrap {
      flex: 1;
      position: relative;
    }

    .dropdown-btn {
      width: 100%;
      padding: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .dropdown-btn:hover { border-color: var(--border-mid); color: var(--text); }
    .dropdown-btn.has-selection { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .dropdown-count {
      background: var(--accent);
      color: #09090e;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface-2);
      border: 1px solid var(--border-mid);
      border-radius: 14px;
      padding: 10px;
      z-index: 50;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      min-width: 200px;
    }

    .dropdown-wrap.open .dropdown-menu { display: flex; }
    .dropdown-wrap.open .dropdown-btn { border-color: var(--border-mid); }

    /* ── Chips ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--border-mid); color: var(--text); }
    .chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Prompt ── */
    .prompt-wrap {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px 4px 4px 16px;
      transition: border-color 0.2s;
    }
    .prompt-wrap:focus-within { border-color: var(--border-mid); }

    .prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      padding: 10px 0;
    }
    .prompt-input::placeholder { color: var(--text-3); }

    .prompt-clear {
      background: transparent;
      border: none;
      color: var(--text-3);
      font-size: 18px;
      cursor: pointer;
      padding: 8px 10px;
      line-height: 1;
      transition: color 0.15s;
    }
    .prompt-clear:hover { color: var(--text-2); }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-ghost {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--border-mid); color: var(--text); }

    .btn-primary {
      background: var(--accent);
      border: none;
      color: #0a0a0f;
    }
    .btn-primary:hover:not(:disabled) {
      background: #fbbf24;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-3);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 8px 0;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--surface-3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error {
      font-size: 12px;
      color: var(--red);
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 12px 14px;
      word-break: break-word;
    }

    /* ── Result Card ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-art-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface-2);
      position: relative;
      overflow: hidden;
    }

    .result-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .result-art-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      opacity: 0.15;
    }

    .result-mode-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(9,9,14,0.75);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-2);
    }

    .result-body {
      padding: 20px;
    }

    .result-artist {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .result-album {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: 14px;
    }

    .result-explanation {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-2);
      margin-bottom: 18px;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .result-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .result-btn:hover:not(:disabled) { border-color: var(--border-mid); color: var(--text); }
    .result-btn.danger:hover { border-color: rgba(239,68,68,0.4); color: var(--red); }
    .result-btn.accent { border-color: var(--accent); color: var(--accent); }
    .result-btn.accent:hover { background: var(--accent-dim); }
    .result-btn.muted { color: var(--text-3); border-color: transparent; }
    .result-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Edit Panel ── */
    .edit-panel {
      margin-top: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: slideUp 0.25s ease forwards;
    }

    .edit-field label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .edit-input {
      width: 100%;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .edit-input:focus { border-color: var(--border-mid); }

    .edit-preview {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .edit-actions {
      display: flex;
      gap: 8px;
    }

    .edit-save {
      flex: 1;
      padding: 9px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #09090e;
      cursor: pointer;
      transition: all 0.15s;
    }
    .edit-save:hover { background: #fbbf24; }

    .edit-cancel {
      padding: 9px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .edit-cancel:hover { border-color: var(--border-mid); }

    .edit-confirm {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
    }

    /* ── Divider sections ── */
    .section {
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }

    /* ── Add album ── */
    .add-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px 4px 4px 14px;
      transition: border-color 0.2s;
    }
    .add-row:focus-within { border-color: var(--border-mid); }

    .add-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--text);
      padding: 9px 0;
    }
    .add-input::placeholder { color: var(--text-3); }

    .add-btn {
      padding: 8px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .add-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .confirm-msg {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      margin-top: 8px;
    }

    /* ── Download btn ── */
    .download-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 10px;
      text-align: center;
    }
    .download-btn:hover { border-color: var(--border-mid); color: var(--text); }

    /* ── Upload zone ── */
    .upload-zone {
      background: var(--surface);
      border: 1px dashed var(--border-mid);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .upload-zone:hover { border-color: var(--accent); background: var(--accent-dim); }

    .upload-icon { font-size: 28px; opacity: 0.25; }

    .upload-text {
      font-size: 13px;
      color: var(--text-2);
    }

    .upload-count {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── API key input ── */
    .key-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.06em;
    }
    .key-input:focus { border-color: var(--border-mid); }

    /* ── Setup modal ── */
    .setup-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(9,9,14,0.92);
      backdrop-filter: blur(12px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .setup-modal {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 24px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .setup-wordmark {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      text-align: center;
    }

    .setup-wordmark span { color: var(--accent); }

    .setup-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    .setup-desc {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-2);
      text-align: center;
    }

    .setup-desc a {
      color: var(--accent);
      text-decoration: none;
    }

    .setup-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.04em;
    }

    .setup-input:focus { border-color: var(--border-mid); }

    .setup-save {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #09090e;
      cursor: pointer;
      transition: background 0.15s;
    }

    .setup-save:hover:not(:disabled) { background: #fbbf24; }
    .setup-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .setup-link {
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
    }

    .setup-link a { color: var(--accent); text-decoration: none; }

    /* ── Loading screen ── */
    .loading-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: var(--bg);
    }

    .loading-wordmark {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-3);
    }

    .loading-wordmark span { color: var(--accent); opacity: 0.5; }

    .loading-dots {
      display: flex;
      gap: 6px;
    }

    .loading-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>

    function matchesTags(entry, tagMap, hintMap, selected) {
      if (!selected.length) return true;
      const lower = entry.toLowerCase();
      return selected.some(filter => {
        const keywords = tagMap[filter] || [];
        const hints = (hintMap && hintMap[filter]) || [];
        return keywords.some(k => lower.includes(k.toLowerCase()))
          || hints.some(h => lower.includes(h.toLowerCase()));
      });
    }

      return { artist: entry.slice(0, dashIdx), album: entry.slice(dashIdx + 3) };
    }

              <div className={`dropdown-wrap${moodOpen ? " open" : ""}`}>
                <button
                  className={`dropdown-btn${selectedMoods.length ? " has-selection" : ""}`}
                  onClick={() => { setMoodOpen(!moodOpen); setGenreOpen(false); }}
                >
                  Mood
                  {selectedMoods.length > 0 && (
                    <span className="dropdown-count">{selectedMoods.length}</span>
                  )}
                </button>
                <div className="dropdown-menu">
                  {MOODS.map(m => (
                    <button key={m} className={`chip${selectedMoods.includes(m) ? " active" : ""}`}
                      onClick={() => toggleFilter(selectedMoods, setSelectedMoods, m)}>{m}</button>
                  ))}
                </div>
              </div>
            </div>

            {/* Prompt */}
            <div>
              <div className="label">Tell me more</div>
              <div className="prompt-wrap">
                <input className="prompt-input"
                  placeholder="late night drive, cooking, need energy..."
                  value={prompt}
                  onChange={e => setPrompt(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && aiRecommend()}
                />
                {prompt && (
                  <button className="prompt-clear" onClick={() => setPrompt("")}>×</button>
                )}
              </div>
            </div>

            {/* Actions */}
            <div className="actions">
              <button className="btn btn-ghost" onClick={randomPick} disabled={!albums.length || isLoading}>
                Shuffle
              </button>
              <button className="btn btn-primary" onClick={aiRecommend} disabled={!albums.length || isLoading}>
                Recommend
              </button>
            </div>

            {/* Loading */}
            {isLoading && (
              <div className="loading">
                <div className="spinner" />
                Searching your library...
              </div>
            )}

            {/* Error */}
            {error && <div className="error">{error}</div>}

            {/* Result */}
            {currentPick && !isLoading && (
              <div className="result-card">
                <div className="result-art-wrap">
                  {albumArt
                    ? <img className="result-art" src={albumArt} alt={displayAlbum || parsed.album} />
                    : <div className="result-art-placeholder">♫</div>
                  }
                  <div className="result-mode-badge">
                    {mode === "ai" ? "✦ recommended" : "⇄ shuffled"}
                  </div>
                </div>
                <div className="result-body">
                  {(displayArtist || parsed.artist) && (
                    <div className="result-artist">{displayArtist || parsed.artist}</div>
                  )}
                  <div className="result-album">{displayAlbum || parsed.album}</div>
                  {explanation && (
                    <div className="result-explanation">{explanation}</div>
                  )}
                  <div className="result-actions">
                    {mode === "ai" && (
                      <button className="result-btn accent" onClick={aiRecommend} disabled={isLoading}>
                        Try another
                      </button>
                    )}
                    {mode === "ai" && (
                      <button className={`result-btn${feedbackGiven ? " muted" : " danger"}`}
                        onClick={reportWrong} disabled={feedbackGiven}>
                        {feedbackGiven ? "Noted ✓" : "Wrong vibe"}
                      </button>
                    )}
                    <button className="result-btn" onClick={() => { setShowEdit(!showEdit); setEditConfirm(false); }}>
                      {showEdit ? "Cancel" : "Fix this"}
                    </button>
                  </div>

                  {showEdit && (
                    <div className="edit-panel">
                      <div className="edit-field">
                        <label>Artist</label>
                        <input className="edit-input" value={editArtist} onChange={e => setEditArtist(e.target.value)} placeholder="Artist name" />
                      </div>
                      <div className="edit-field">
                        <label>Album</label>
                        <input className="edit-input" value={editAlbum} onChange={e => setEditAlbum(e.target.value)} placeholder="Album title" />
                      </div>
                      <div className="edit-field">
                        <label>Album art URL</label>
                        <input className="edit-input" value={editArt} onChange={e => setEditArt(e.target.value)} placeholder="Paste image URL..." />
                      </div>
                      {editArt && (
                        <img className="edit-preview" src={editArt} alt="preview" onError={e => e.target.style.display="none"} />
                      )}
                      <div className="edit-actions">
                        <button className="edit-save" onClick={saveCorrection}>Save correction</button>
                        <button className="edit-cancel" onClick={() => setShowEdit(false)}>Cancel</button>
                      </div>
                      {editConfirm && <div className="edit-confirm">Saved ✓</div>}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Add album */}
            <div className="section">
              <div className="label">Add an album</div>
              <div className="add-row">
                <input className="add-input" placeholder="Artist - Album Title"
                  value={newAlbum} onChange={e => setNewAlbum(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addAlbum()} />
                <button className="add-btn" onClick={addAlbum} disabled={!newAlbum.trim()}>Add</button>
              </div>
              {addConfirm && <div className="confirm-msg">{addConfirm}</div>}
              {albums.length > 0 && (
                <button className="download-btn" onClick={downloadCSV}>
                  Download library ({albums.length} albums)
                </button>
              )}
            </div>





          </main>
        </div>

          {/* First-run setup modal */}
          {showSetup && (
            <div className="setup-backdrop">
              <div className="setup-modal">
                <div className="setup-wordmark">entr<span>ain</span></div>
                <div className="setup-title">One quick thing</div>
                <div className="setup-desc">
                  Entrain uses the Anthropic API to power recommendations. Add your API key to get started — it's stored securely and never shared.
                </div>
                <input
                  className="setup-input"
                  type="password"
                  placeholder="sk-ant-..."
                  value={setupKey}
                  onChange={e => setSetupKey(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && saveSetupKey()}
                  autoFocus
                />
                <button className="setup-save" onClick={saveSetupKey} disabled={!setupKey.trim() || setupSaving}>
                  {setupSaving ? "Saving..." : "Get started"}
                </button>
                <div className="setup-link">
                  Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Entrain />);
  </script>
</body>
</html>
